<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCart | Create Account</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-layer-group"></i> <span>ForgeCart</span>
        </a>
        <div class="nav-links" id="auth-links">
            <!-- Populated by ui-handler.js -->
        </div>
    </nav>

    <div class="container auth-wrapper">
        <div class="glass auth-container">
            <h2>Initiate Access</h2>
            <form id="register-form">
                <div id="error-message" style="color: #ff4d4d; margin-bottom: 10px; font-size: 0.9rem; display: none;"></div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="developer@backforge.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a secure password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm_password" class="form-control" placeholder="Verify password" required minlength="6">
                </div>
                <button type="submit" id="register-btn" class="btn btn-block" style="margin-top: 15px;">
                    <i class="fas fa-user-plus"></i> Initialize Account
                </button>
            </form>
            <p>Already registered? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <i class="fas fa-layer-group"></i> ForgeCart
                <span>· BackForge 2026</span>
            </div>
            <div class="footer-links">
                <a href="index.html">Store</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="login.html">Account</a>
            </div>
            <div class="footer-copy">
                Built for the BackForge Hackathon · Designed with precision
            </div>
        </div>
    </footer>
    <script type="module" src="js/ui-handler.js"></script>
    <script type="module">
        import { registerUser } from './js/auth-logic.js';

        const registerForm = document.getElementById('register-form');
        const errorMessage = document.getElementById('error-message');
        const registerBtn = document.getElementById('register-btn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // Basic validation
            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match.";
                errorMessage.style.display = 'block';
                return;
            }

            // Reset UI
            errorMessage.style.display = 'none';
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing Account...';

            const response = await registerUser(name, email, password);

            if (response.success) {
                window.location.href = 'index.html';
            } else {
                errorMessage.textContent = response.error;
                errorMessage.style.display = 'block';
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Initialize Account';
            }
        });
    </script>
</body>
</html>
