<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCart | Admin Control Center</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-layer-group"></i> <span>ForgeCart Admin</span>
        </a>
        <div class="nav-links" id="auth-links">
            <!-- Populated by ui-handler.js -->
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Admin Dashboard</h1>
            <div id="admin-stats" class="flex gap-4">
                <!-- Dynamic Stats -->
            </div>
        </div>

        <div class="admin-layout" style="display: grid; grid-template-columns: 250px 1fr; gap: 30px;">
            <div class="glass sidebar" style="padding: 20px; height: fit-content;">
                <button class="btn btn-block active" data-tab="products" style="margin-bottom: 10px; justify-content: flex-start;">
                    <i class="fas fa-boxes"></i> Inventory Management
                </button>
                <button class="btn btn-outline btn-block" data-tab="orders" style="margin-bottom: 10px; justify-content: flex-start;">
                    <i class="fas fa-receipt"></i> Order Logs
                </button>
                <button class="btn btn-outline btn-block" data-tab="users" style="justify-content: flex-start;">
                    <i class="fas fa-users"></i> User Directory
                </button>
            </div>

            <div class="main-content">
                <!-- Products Tab -->
                <div id="tab-products" class="tab-pane">
                    <div class="flex justify-between items-center mb-6">
                        <h2 style="font-family: 'Outfit';">Catalog Optimization</h2>
                        <button class="btn" id="add-product-btn">
                            <i class="fas fa-plus"></i> New Asset
                        </button>
                    </div>
                    <div id="admin-product-grid" class="product-grid" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
                        <!-- Products List -->
                    </div>
                </div>

                <!-- Orders Tab -->
                <div id="tab-orders" class="tab-pane" style="display: none;">
                    <h2 style="font-family: 'Outfit'; margin-bottom: 25px;">Mission Control: Orders</h2>
                    <div class="table-responsive">
                        <table class="glass" style="margin-top: 0;">
                            <thead>
                                <tr>
                                    <th>Ref ID</th>
                                    <th>Customer</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-orders-list">
                                <!-- Orders List -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Users Tab -->
                <div id="tab-users" class="tab-pane" style="display: none;">
                    <h2 style="font-family: 'Outfit'; margin-bottom: 25px;">User Database</h2>
                    <div id="admin-users-list" class="flex flex-col gap-4">
                        <!-- Users List -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal (Hidden by default) -->
    <div id="product-modal" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div class="glass modal-content" style="width: 100%; max-width: 500px; padding: 40px; position: relative;">
            <button id="close-modal" style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem;">&times;</button>
            <h3 id="modal-title" style="margin-bottom: 25px;">Initialize New Asset</h3>
            <form id="product-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="p-title" class="form-control" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" step="0.01" id="p-price" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Inventory</label>
                        <input type="number" id="p-inventory" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="p-category" class="form-control">
                        <option value="clothing">Clothing</option>
                        <option value="digital">Digital</option>
                        <option value="accessories">Accessories</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p-desc" class="form-control" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-block" style="margin-top: 10px;">
                    <i class="fas fa-save"></i> Commit Changes
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="js/ui-handler.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
