<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCart | Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-layer-group"></i> <span>ForgeCart</span>
        </a>
        <div class="nav-links" id="auth-links">
            <!-- Populated by ui-handler.js -->
        </div>
    </nav>

    <div class="container auth-wrapper">
        <div class="glass auth-container">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div id="error-message" style="color: #ff4d4d; margin-bottom: 10px; font-size: 0.9rem; display: none;"></div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="developer@backforge.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-btn" class="btn btn-block" style="margin-top: 15px;">
                    <i class="fas fa-sign-in-alt"></i> Access Account
                </button>
            </form>
            <p>Don't have an account? <a href="register.html">Create one</a></p>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <i class="fas fa-layer-group"></i> ForgeCart
                <span>· BackForge 2026</span>
            </div>
            <div class="footer-links">
                <a href="index.html">Store</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="login.html">Account</a>
            </div>
            <div class="footer-copy">
                Built for the BackForge Hackathon · Designed with precision
            </div>
        </div>
    </footer>
    <script type="module" src="js/ui-handler.js"></script>
    <script type="module">
        import { loginUser } from './js/auth-logic.js';

        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Reset UI
            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            const response = await loginUser(email, password);

            if (response.success) {
                window.location.href = 'index.html';
            } else {
                errorMessage.textContent = response.error;
                errorMessage.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Account';
            }
        });
    </script>
</body>
</html>
